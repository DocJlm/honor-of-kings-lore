<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 640" width="920" height="640" font-family="'Noto Sans SC','Microsoft YaHei',sans-serif" role="img" aria-label="王者大陆区域示意图">
  <defs>
    <radialGradient id="sea" cx="50%" cy="45%" r="75%">
      <stop offset="0" stop-color="#16384d"/><stop offset="1" stop-color="#0b2030"/>
    </radialGradient>
    <linearGradient id="land" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d9c79a"/><stop offset="1" stop-color="#b89a63"/>
    </linearGradient>
  </defs>
  <rect width="920" height="640" fill="url(#sea)"/>

  <!-- 大陆主体 -->
  <path d="M150,150 Q120,250 160,330 Q120,430 220,500 Q320,580 460,560 Q620,575 700,500 Q800,470 780,360 Q820,260 740,200 Q650,120 480,135 Q300,118 150,150 Z"
        fill="url(#land)" stroke="#7a5e2e" stroke-width="3"/>

  <!-- 长城（北部城墙） -->
  <path d="M210,168 L300,150 L420,158 L560,150 L680,178" fill="none" stroke="#5a4326" stroke-width="7" stroke-dasharray="2 10" stroke-linecap="round"/>
  <text x="600" y="150" fill="#3a2c16" font-size="13" font-weight="700">长城</text>

  <title>王者大陆 · 区域示意图</title>
  <text x="460" y="40" text-anchor="middle" fill="#f5c542" font-size="26" font-weight="700">王者大陆 · 区域示意图</text>
  <text x="460" y="62" text-anchor="middle" fill="#9fb6c4" font-size="13">非官方精确地理 · 仅示意主要阵营分布与方位关系</text>

  <!-- 区域标记 helper: rect + label -->
  <!-- 长城守卫军 -->
  <g><rect x="372" y="166" rx="6" width="120" height="34" fill="#3a7d5c" opacity="0.95"/><text x="432" y="188" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">长城守卫军</text></g>
  <!-- 云中漠地 / 王者峡谷 -->
  <g><rect x="180" y="206" rx="6" width="150" height="48" fill="#3a7d5c" opacity="0.95"/><text x="255" y="226" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">云中漠地 · 边陲</text><text x="255" y="244" text-anchor="middle" fill="#d6ffe9" font-size="12">⚔ 王者峡谷</text></g>
  <!-- 稷下学院 -->
  <g><rect x="412" y="220" rx="6" width="116" height="34" fill="#4a90d2" opacity="0.95"/><text x="470" y="242" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">稷下学院</text></g>
  <!-- 墨家机关城 -->
  <g><rect x="548" y="246" rx="6" width="150" height="34" fill="#4a90d2" opacity="0.9"/><text x="623" y="268" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">墨家机关城·天工坊</text></g>
  <!-- 镐京·封神 -->
  <g><rect x="160" y="306" rx="6" width="120" height="34" fill="#7e57c2" opacity="0.95"/><text x="220" y="328" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">镐京 · 朝歌</text></g>
  <!-- 长安城（中枢，★） -->
  <g><rect x="392" y="316" rx="8" width="136" height="44" fill="#f5c542" stroke="#7a5e2e" stroke-width="2"/><text x="460" y="345" text-anchor="middle" fill="#1a1a2e" font-size="17" font-weight="700">★ 长安城</text></g>
  <!-- 三分之地 -->
  <g><rect x="600" y="338" rx="6" width="150" height="48" fill="#b5462a" opacity="0.95"/><text x="675" y="358" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">三分之地</text><text x="675" y="376" text-anchor="middle" fill="#ffe2d6" font-size="12">魏 · 蜀 · 吴</text></g>
  <!-- 江湖侠客 -->
  <g><rect x="500" y="430" rx="6" width="120" height="34" fill="#c87f2a" opacity="0.95"/><text x="560" y="452" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">江湖侠客</text></g>
  <!-- 百越·建木 -->
  <g><rect x="330" y="490" rx="6" width="140" height="34" fill="#c87f2a" opacity="0.95"/><text x="400" y="512" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">百越 · 建木 🌳</text></g>
  <!-- 起源之地 / 上古众神 -->
  <g><rect x="225" y="430" rx="6" width="150" height="34" fill="#7e57c2" opacity="0.85"/><text x="300" y="452" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">起源之地 · 众神</text></g>

  <!-- 蓬莱·东海/海都（西南海岛） -->
  <g><ellipse cx="118" cy="500" rx="62" ry="40" fill="#1f8a99" opacity="0.9" stroke="#0b2030"/><text x="118" y="496" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">蓬莱·东海</text><text x="118" y="514" text-anchor="middle" fill="#d6fbff" font-size="12">海都</text></g>
  <!-- 扶桑/血族（极东海岛） -->
  <g><ellipse cx="840" cy="320" rx="58" ry="42" fill="#1f8a99" opacity="0.9" stroke="#0b2030"/><text x="840" y="316" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">扶桑</text><text x="840" y="334" text-anchor="middle" fill="#d6fbff" font-size="12">血族之地</text></g>
  <!-- 倒悬天之外（魔道暗影，左上界外） -->
  <g><rect x="40" y="70" rx="6" width="160" height="34" fill="#444" opacity="0.95"/><text x="120" y="92" text-anchor="middle" fill="#ff8a8a" font-size="13" font-weight="700">倒悬天之外 · 魔道暗影</text></g>
  <path d="M150,150 Q120,120 120,104" fill="none" stroke="#666" stroke-width="1.5" stroke-dasharray="3 4"/>

  <!-- 指南针 -->
  <g transform="translate(852,470)">
    <circle r="30" fill="#0b2030" stroke="#f5c542" stroke-width="1.5"/>
    <polygon points="0,-24 6,0 0,8 -6,0" fill="#e05555"/><polygon points="0,24 6,0 0,-8 -6,0" fill="#cfd8dc"/>
    <text x="0" y="-32" text-anchor="middle" fill="#f5c542" font-size="12">北</text>
  </g>

  <!-- 图例 -->
  <g transform="translate(30,560)" font-size="12">
    <rect x="-10" y="-16" width="540" height="64" rx="6" fill="#0b2030" opacity="0.72" stroke="#33586b"/>
    <rect x="0" y="-8" width="14" height="14" fill="#f5c542"/><text x="20" y="3" fill="#dfe7ec">中枢·长安</text>
    <rect x="120" y="-8" width="14" height="14" fill="#4a90d2"/><text x="140" y="3" fill="#dfe7ec">学院·机关</text>
    <rect x="240" y="-8" width="14" height="14" fill="#b5462a"/><text x="260" y="3" fill="#dfe7ec">三分之地</text>
    <rect x="360" y="-8" width="14" height="14" fill="#7e57c2"/><text x="380" y="3" fill="#dfe7ec">封神·众神</text>
    <rect x="0" y="16" width="14" height="14" fill="#3a7d5c"/><text x="20" y="27" fill="#dfe7ec">北疆·边陲</text>
    <rect x="120" y="16" width="14" height="14" fill="#1f8a99"/><text x="140" y="27" fill="#dfe7ec">海外·远东</text>
    <rect x="240" y="16" width="14" height="14" fill="#c87f2a"/><text x="260" y="27" fill="#dfe7ec">江湖·百越</text>
    <rect x="360" y="16" width="14" height="14" fill="#444"/><text x="380" y="27" fill="#dfe7ec">魔道·暗面</text>
  </g>
</svg>
