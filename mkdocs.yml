site_name: 王者荣耀 · 王者大陆全史
site_description: 《王者荣耀》世界观剧情、阵营势力、英雄故事与人物关系全图鉴 —— 图文 · 表格 · 关系网，越详细越好。
site_author: Honor of Kings Lore Wiki
# 部署到 GitHub Pages 后的地址（按需修改用户名/仓库名）
site_url: https://winbeau.github.io/honor-of-kings-lore/

# 代码仓库（按需修改）
repo_url: https://github.com/winbeau/honor-of-kings-lore
repo_name: winbeau/honor-of-kings-lore
edit_uri: edit/main/docs/

copyright: >
  本站为非营利的粉丝向二次整理与考据，仅供学习交流；《王者荣耀》世界观、英雄、剧情与图像版权均归
  <a href="https://pvp.qq.com/" target="_blank" rel="noopener">腾讯《王者荣耀》</a> 所有。

theme:
  name: material
  language: zh
  logo: assets/img/logo.svg
  favicon: assets/img/logo.svg
  icon:
    repo: fontawesome/brands/github
    admonition:
      note: material/crown
  font:
    text: Noto Sans SC
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: amber
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.tooltips
    - content.tabs.link
    - announce.dismiss

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: "¶"
      toc_depth: 3
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.details
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.keys
  - pymdownx.smartsymbols
  - pymdownx.betterem
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search:
      separator: '[\s​\-_,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])|[一-鿿]'
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      width: "90%"
      auto_caption: true

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/winbeau/honor-of-kings-lore
      name: GitHub 仓库
    - icon: material/sword-cross
      link: https://pvp.qq.com/
      name: 王者荣耀官网
  generator: false

